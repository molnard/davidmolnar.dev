<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" width="200" height="64">
  <!-- Background -->
  <rect width="200" height="64" rx="8" fill="#F7931A"/>

  <!-- Bitcoin B symbol -->
  <g fill="white" transform="translate(12, 8)">
    <!-- Vertical stroke -->
    <rect x="8" y="0" width="5" height="48" rx="2"/>
    <!-- Top bar -->
    <rect x="8" y="0" width="18" height="5" rx="2"/>
    <!-- Middle bar -->
    <rect x="8" y="21" width="16" height="5" rx="2"/>
    <!-- Bottom bar -->
    <rect x="8" y="43" width="18" height="5" rx="2"/>
    <!-- Top right bump -->
    <path d="M24 2 Q38 2 38 13 Q38 24 24 24 L24 22 Q34 22 34 13 Q34 4 24 4Z" fill="white"/>
    <!-- Bottom right bump -->
    <path d="M24 24 Q40 24 40 36 Q40 48 24 48 L24 46 Q36 46 36 36 Q36 26 24 26Z" fill="white"/>
    <!-- Serifs on top and bottom -->
    <rect x="5" y="0" width="11" height="4" rx="2"/>
    <rect x="5" y="44" width="11" height="4" rx="2"/>
  </g>

  <!-- Text -->
  <text x="66" y="24" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="13" fill="white" letter-spacing="1">BITCOIN</text>
  <text x="66" y="44" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="11" fill="white" letter-spacing="0.5">ACCEPTED HERE</text>
</svg>
