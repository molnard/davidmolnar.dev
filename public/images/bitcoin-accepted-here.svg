<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-labelledby="title desc">
  <title id="title">Bitcoin accepted here</title>
  <desc id="desc">A light Bitcoin accepted here payment badge.</desc>
  <defs>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffbe55"/>
      <stop offset="0.46" stop-color="#f7931a"/>
      <stop offset="1" stop-color="#d77a05"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaf1"/>
      <stop offset="1" stop-color="#f5ead8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f352b" flood-opacity="0.13"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="18" y="20" width="724" height="180" rx="32" fill="url(#paper)"/>
    <rect x="22" y="24" width="716" height="172" rx="28" fill="none" stroke="#e8d8bd" stroke-width="4"/>
    <rect x="34" y="36" width="692" height="148" rx="22" fill="#fffdf8" stroke="#f0e4cf" stroke-width="2"/>
  </g>

  <g transform="translate(78 50)">
    <circle cx="60" cy="60" r="58" fill="url(#orange)"/>
    <circle cx="60" cy="60" r="48" fill="none" stroke="#fff" stroke-opacity=".38" stroke-width="5"/>
    <text x="60" y="84"
      text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="76"
      font-weight="800"
      fill="#fff">₿</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-weight="900">
    <text x="190" y="91" font-size="54" fill="#0f1a14" letter-spacing=".5">BITCOIN</text>
    <text x="192" y="151" font-size="38" fill="#b86608" letter-spacing=".8">ACCEPTED HERE</text>
  </g>

  <g fill="#f7931a" fill-opacity=".22">
    <circle cx="662" cy="68" r="7"/>
    <circle cx="686" cy="68" r="7"/>
    <circle cx="662" cy="152" r="7"/>
    <circle cx="686" cy="152" r="7"/>
  </g>
</svg>
